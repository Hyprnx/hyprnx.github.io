<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog post — Hyprnx">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <title>Loading... — Hyprnx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <!-- Marked.js: lightweight markdown parser (7kb gzipped) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)})();
    function toggleTheme(){
      var h=document.documentElement,c=h.getAttribute('data-theme'),
          d=c?c==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches,
          n=d?'light':'dark';
      if(typeof runWipeAnimation==='function'){
        runWipeAnimation(function(){h.setAttribute('data-theme',n);localStorage.setItem('theme',n)});
      } else {
        h.setAttribute('data-theme',n);localStorage.setItem('theme',n);
      }
    }
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="ambient-glow" aria-hidden="true"></div>
  <div class="ambient-glow ambient-glow--secondary" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="../en/index.html" class="nav__logo">@hyprnx</a>
      <div class="nav__links">
        <a href="../en/about.html" class="nav__link">About</a>
        <a href="../en/projects.html" class="nav__link">Projects</a>
        <a href="../en/blog.html" class="nav__link nav__link--active">Blog</a>
        <a href="../en/contact.html" class="nav__link">Contact</a>
      </div>
      <div class="nav__actions">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg class="theme-toggle__moon" viewBox="0 0 20 20" fill="none"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.003 8.003 0 1010.586 10.586z" fill="currentColor"/></svg>
          <svg class="theme-toggle__sun" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2m0 12v2m8-8h-2M4 10H2m13.07-5.07l-1.41 1.41M6.34 13.66l-1.41 1.41m0-10.14l1.41 1.41m7.32 7.32l1.41 1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="nav__burger" aria-label="Toggle menu" onclick="this.closest('.nav').classList.toggle('nav--open')">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main id="main">
    <article class="post">
      <header class="post__header">
        <a href="../en/blog.html" class="post__back">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back to Blog
        </a>
        <time id="post-date" class="post__date"></time>
        <h1 id="post-title" class="post__title" style="opacity: 0.3;">Loading...</h1>
      </header>
      <div id="post-body" class="post__body"></div>
    </article>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <div class="footer__copy">
          <span class="mono">&copy; <span id="year"></span></span> To Duc Anh. Made on earth, in Vietnam.
        </div>
        <div class="footer__links">
          <a href="https://github.com/Hyprnx" class="footer__link" target="_blank" rel="noopener">GitHub</a>
          <a href="https://linkedin.com/in/duc-anh-to" class="footer__link" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    (function() {
      // Get slug from URL: post.html?s=hello-world
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('s');

      if (!slug) {
        document.getElementById('post-title').textContent = 'Post not found';
        document.getElementById('post-title').style.opacity = '1';
        return;
      }

      // Load post metadata from posts.json
      fetch('posts.json')
        .then(function(r) { return r.json(); })
        .then(function(posts) {
          var meta = null;
          for (var i = 0; i < posts.length; i++) {
            if (posts[i].slug === slug) { meta = posts[i]; break; }
          }

          // Set title and date from metadata
          if (meta) {
            document.title = meta.title + ' — Hyprnx';
            document.querySelector('meta[name="description"]').content = meta.excerpt;
            document.getElementById('post-title').textContent = meta.title;
            document.getElementById('post-title').style.opacity = '1';
            var d = new Date(meta.date + 'T00:00:00');
            var dateEl = document.getElementById('post-date');
            dateEl.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            dateEl.setAttribute('datetime', meta.date);
          }

          // Fetch and render the markdown file
          return fetch(slug + '.md');
        })
        .then(function(r) {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(function(md) {
          // Strip the first H1 (already shown in post__title)
          md = md.replace(/^#\s+.+\n+/, '');

          // Parse markdown to HTML
          var html = marked.parse(md);

          document.getElementById('post-body').innerHTML = html;
          document.getElementById('post-title').style.opacity = '1';
        })
        .catch(function() {
          document.getElementById('post-title').textContent = 'Post not found';
          document.getElementById('post-title').style.opacity = '1';
          document.getElementById('post-body').innerHTML =
            '<p>This post could not be loaded. <a href="../en/blog.html">Back to blog</a>.</p>';
        });
    })();
  </script>
</body>
</html>
